<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect — NoSQL Campus Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #090d16;
            --bg2: #0f1626;
            --bg3: #162035;
            --border: #22314d;
            --blue: #3b82f6;
            --blue-dim: #3b82f61a;
            --green: #10b981;
            --green-dim: #10b9811a;
            --purple: #8b5cf6;
            --purple-dim: #8b5cf61a;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 18px;
            margin-bottom: 24px;
        }
        .logo {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            background: var(--green-dim);
            color: var(--green);
            padding: 4px 10px;
            border-radius: 100px;
            border: 1px solid var(--green);
        }
        .layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
        }
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
        }
        .card-header {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tab-btn {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--blue);
            color: var(--text);
            border-color: var(--blue);
        }
        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        input, select, textarea {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            width: 100%;
        }
        input:focus { border-color: var(--blue); }
        .btn {
            background: var(--blue);
            color: var(--text);
            border: none;
            padding: 9px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-seed {
            background: var(--purple-dim);
            color: var(--purple);
            border: 1px solid var(--purple);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }
        /* Lists */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        .list-item {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }
        .list-item-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .list-item-sub {
            font-size: 11px;
            color: var(--text-dim);
            font-family: 'Fira Code', monospace;
        }
        /* Discussion Thread */
        .thread-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }
        .comment-node {
            border-left: 2px solid var(--border);
            padding-left: 14px;
            margin-left: 8px;
            margin-top: 8px;
        }
        .comment-header {
            font-size: 11px;
            font-weight: 600;
            color: var(--blue);
            margin-bottom: 2px;
        }
        .comment-text {
            font-size: 13px;
            color: var(--text);
            margin-bottom: 4px;
        }
        .reply-btn {
            font-size: 10px;
            color: var(--text-dim);
            cursor: pointer;
            text-decoration: underline;
        }
        /* Live feed */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 500px;
            overflow-y: auto;
        }
        .feed-item {
            font-size: 12px;
            background: var(--bg3);
            border-radius: 6px;
            padding: 8px 12px;
            border-left: 3px solid var(--purple);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div>
            <div class="logo">🎓 CampusConnect</div>
            <div style="font-size:11px; color:var(--text-dim); margin-top:2px;">Advanced NoSQL Database Ecosystem</div>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn-seed" onclick="seedDatabase()">⚡ Seed Mock Data</button>
            <div class="status">LIVE SYSTEM</div>
        </div>
    </header>

    <div class="layout">
        <div class="main-panel">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('carpool', this)">🚗 Geospatial Carpools</button>
                <button class="tab-btn" onclick="switchTab('discussion', this)">💬 Recursive Discussions</button>
            </div>

            <!-- TAB 1: CARPOOL -->
            <div id="carpoolTab" class="card">
                <div class="card-header">
                    <span>Geospatial Route Matcher ($nearSphere)</span>
                </div>
                
                <div class="form-grid">
                    <div class="input-group">
                        <label>Search Center Longitude (e.g. 74.3587)</label>
                        <input type="number" step="any" id="searchLng" value="74.3587">
                    </div>
                    <div class="input-group">
                        <label>Search Center Latitude (e.g. 31.5204)</label>
                        <input type="number" step="any" id="searchLat" value="31.5204">
                    </div>
                </div>
                <button class="btn" style="margin-bottom: 20px;" onclick="searchCarpools()">🔍 Find Routes within 5km</button>

                <div class="item-list" id="carpoolList">
                    <div style="text-align:center; color:var(--text-dim); padding:20px; font-size:12px;">Click find or load seed data.</div>
                </div>
            </div>

            <!-- TAB 2: DISCUSSION -->
            <div id="discussionTab" class="card" style="display: none;">
                <div class="card-header">
                    <span>Recursive Post Comments ($graphLookup)</span>
                </div>
                
                <div class="input-group" style="margin-bottom:16px;">
                    <label>Select Post Thread</label>
                    <select id="postSelector" onchange="loadPostThread()">
                        <option value="">-- Click Seed Data first to create post --</option>
                    </select>
                </div>

                <div class="thread-container" id="threadContainer"></div>
            </div>
        </div>

        <!-- RIGHT PANEL: WS STREAM -->
        <div class="card">
            <div class="card-header">Real-Time Streams Feed</div>
            <div class="feed-container" id="feedContainer">
                <div style="font-size:11px; color:var(--text-dim); text-align:center; padding-top:20px;">Awaiting database events...</div>
            </div>
        </div>
    </div>

    <!-- Modals for Reply -->
    <div id="replyModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center;">
        <div class="card" style="width:400px;">
            <div class="card-header">Post a Reply</div>
            <textarea id="replyText" placeholder="Write comment details..." style="height:100px; margin-bottom:12px;"></textarea>
            <input type="hidden" id="parentCommentId">
            <div style="display:flex; justify-content:flex-end; gap:8px;">
                <button class="btn" style="background:var(--bg3); border:1px solid var(--border);" onclick="closeReplyModal()">Cancel</button>
                <button class="btn" onclick="submitReply()">Submit Reply</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io("http://localhost:5001");
        const API_URL = "http://localhost:5001/api";
        
        let loadedUsers = [];
        let currentPostId = null;

        // WebSocket events
        socket.on('carpoolCreated', (data) => {
            addFeedItem(`🚗 New Carpool Route: ${data.driver.name} is offering a ride to ${data.capacity} passengers!`);
        });

        socket.on('newComment', (data) => {
            addFeedItem(`💬 New Comment posted by ${data.author.name}: "${data.text.substring(0, 30)}..."`);
            if (currentPostId) {
                loadPostThread(); // Refresh thread
            }
        });

        function addFeedItem(text) {
            const container = document.getElementById('feedContainer');
            if (container.children.length === 1 && container.innerText.includes("Awaiting")) {
                container.innerHTML = "";
            }
            const item = document.createElement('div');
            item.className = 'feed-item';
            item.innerHTML = `<div>${text}</div><div style="font-size:9px; color:var(--text-dim); margin-top:4px;">${new Date().toLocaleTimeString()}</div>`;
            container.unshift ? container.unshift(item) : container.prepend(item);
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (tab === 'carpool') {
                document.getElementById('carpoolTab').style.display = 'block';
                document.getElementById('discussionTab').style.display = 'none';
            } else {
                document.getElementById('carpoolTab').style.display = 'none';
                document.getElementById('discussionTab').style.display = 'block';
            }
        }

        // Database seeding
        async function seedDatabase() {
            try {
                // 1. Create Mock Users
                const u1 = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: "Aneeque Shahid", email: "aneeque@bnu.edu.pk", role: "driver", department: "CS", vehicleDetails: "Civic LHR-8802" })
                }).then(r => r.json());

                const u2 = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: "Ali Ahmed", email: "ali@bnu.edu.pk", role: "student", department: "SE" })
                }).then(r => r.json());

                loadedUsers = [u1, u2];

                // 2. Create Mock Carpool
                await fetch(`${API_URL}/carpools`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        driver: u1._id,
                        startLocation: { coordinates: [74.3587, 31.5204] },
                        destination: { coordinates: [74.3292, 31.4015] },
                        capacity: 4
                    })
                });

                // 3. Create a Comment which represents a Thread root
                // For simulator, mock post id is a static ObjectId
                const mockPostId = "60f1350a2f6ae2b19de6283e";
                
                const rootComment = await fetch(`${API_URL}/discussions/comment`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        postId: mockPostId,
                        author: u2._id,
                        text: "Is anyone heading to campus near Gulberg tomorrow at 9 AM?",
                        parentCommentId: null
                    })
                }).then(r => r.json());

                // Nested reply
                await fetch(`${API_URL}/discussions/comment`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        postId: mockPostId,
                        author: u1._id,
                        text: "Yes! I have a route matching that area. Just created the carpool route, feel free to join.",
                        parentCommentId: rootComment._id
                    })
                });

                alert("Database successfully seeded with polymorphic users, coordinates, and comments!");
                
                // Load Selectors
                const selector = document.getElementById('postSelector');
                selector.innerHTML = `<option value="${mockPostId}">Discussion Thread #1: BNU Carpooling</option>`;
                currentPostId = mockPostId;
                
                await searchCarpools();
                loadPostThread();

            } catch (err) {
                alert("Seeding failed: " + err.message);
            }
        }

        // Search carpools ($nearSphere)
        async function searchCarpools() {
            const lng = document.getElementById('searchLng').value;
            const lat = document.getElementById('searchLat').value;
            try {
                const res = await fetch(`${API_URL}/carpools/search?lng=${lng}&lat=${lat}`);
                const carpools = await res.json();
                
                const list = document.getElementById('carpoolList');
                if (carpools.length === 0) {
                    list.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-dim); font-size:12px;">No carpool routes found within 5km of this point.</div>`;
                    return;
                }
                list.innerHTML = carpools.map(c => `
                    <div class="list-item">
                        <div class="list-item-title">Driver: ${c.driver.name} (${c.driver.vehicleDetails})</div>
                        <div class="list-item-sub">Start: [${c.startLocation.coordinates.join(', ')}] | Capacity: ${c.capacity} seats</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        // Load recursive thread ($graphLookup)
        async function loadPostThread() {
            const postId = document.getElementById('postSelector').value;
            if (!postId) return;
            currentPostId = postId;
            
            try {
                const res = await fetch(`${API_URL}/discussions/thread?postId=${postId}`);
                const thread = await res.json();
                
                const container = document.getElementById('threadContainer');
                container.innerHTML = "";
                
                // Helper to render tree comments
                thread.forEach(root => {
                    const node = renderCommentTree(root, root.replies || []);
                    container.appendChild(node);
                });
            } catch (e) {
                console.error(e);
            }
        }

        function renderCommentTree(comment, allReplies) {
            const div = document.createElement('div');
            div.className = 'comment-node';
            div.innerHTML = `
                <div class="comment-header">${comment.author.name}</div>
                <div class="comment-text">${comment.text}</div>
                <div class="reply-btn" onclick="openReplyModal('${comment._id}')">Reply</div>
            `;
            
            // Find replies specifically pointing to this comment's id
            const children = allReplies.filter(r => r.parentCommentId === comment._id);
            children.forEach(child => {
                const childNode = renderCommentTree(child, allReplies);
                div.appendChild(childNode);
            });
            
            return div;
        }

        function openReplyModal(parentCommentId) {
            document.getElementById('parentCommentId').value = parentCommentId;
            document.getElementById('replyModal').style.display = 'flex';
        }

        function closeReplyModal() {
            document.getElementById('replyModal').style.display = 'none';
            document.getElementById('replyText').value = "";
        }

        async function submitReply() {
            const text = document.getElementById('replyText').value;
            const parentId = document.getElementById('parentCommentId').value;
            if (!text || !loadedUsers[0]) {
                alert("Please click 'Seed Mock Data' first so users exist.");
                return;
            }
            
            try {
                await fetch(`${API_URL}/discussions/comment`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        postId: currentPostId,
                        author: loadedUsers[0]._id, // Use seed user
                        text: text,
                        parentCommentId: parentId
                    })
                });
                closeReplyModal();
                loadPostThread();
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
